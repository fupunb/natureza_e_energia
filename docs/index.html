<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slides</title>
    <link rel="icon" href="icon/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon/android-chrome-512x512.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/beige.css" id="theme">
    <style>
      .reveal .slides {
        text-align: left;
      }

      .reveal section {
        box-sizing: border-box;
        padding: 0.6em 1.2em;
      }

      .reveal h1 {
        margin-bottom: 0.35em;
      }

      .reveal .deck-intro {
        margin-bottom: 1rem;
        font-size: 0.9em;
      }

      .reveal .deck-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.45em 1.4em;
        list-style: disc;
      }

      .reveal .deck-list li {
        margin-left: 1.15em;
        line-height: 1.4;
      }

      .reveal .deck-list a {
        text-decoration-thickness: 0.06em;
        text-underline-offset: 0.12em;
      }

      .reveal .deck-meta {
        margin-top: 1.5rem;
        font-size: 0.55em;
        opacity: 0.72;
      }

      @media (max-width: 900px) {
        .reveal .deck-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
      <section>
        <h1>Slides</h1>
        <p class="deck-intro">Selecione uma apresentação:</p>
        <ul class="deck-list">
              <li><a href="./descoberta_do_el%C3%A9tron/">descoberta do elétron</a></li>
              <li><a href="./processos_de_eletriza%C3%A7%C3%A3o/">processos de eletrização</a></li>
        </ul>
      </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        center: true,
        transition: "slide",
        backgroundTransition: "fade",
        navigationMode: "linear",
        width: 1280,
        height: 720,
        margin: 0.08
      });
    </script>
  </body>
</html>
